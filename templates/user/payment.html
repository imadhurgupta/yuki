{% extends "layouts/base.html" %}

{% block title %}Secure Payment{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-lock me-2"></i>Secure Payment</h5>
                    <span class="badge bg-success">₹{{ order.total_price }}</span>
                </div>

                <div class="card-body p-0">
                    <ul class="nav nav-pills nav-fill bg-light p-2" id="paymentTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold rounded-pill" id="card-tab" data-bs-toggle="tab"
                                data-bs-target="#card" type="button">
                                <i class="fas fa-credit-card me-2"></i>Card
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold rounded-pill" id="upi-tab" data-bs-toggle="tab"
                                data-bs-target="#upi" type="button">
                                <i class="fas fa-mobile-alt me-2"></i>UPI / QR
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content p-4">

                        <div class="tab-pane fade show active" id="card" role="tabpanel">
                            <form action="{{ url_for('user_bp.process_payment', order_id=order.id) }}" method="POST"
                                id="cardForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Card Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="fab fa-cc-visa"></i></span>
                                        <input type="text" class="form-control" placeholder="0000 0000 0000 0000"
                                            maxlength="19" required>
                                    </div>
                                </div>
                                <div class="row g-3 mb-4">
                                    <div class="col-6">
                                        <label class="form-label small fw-bold text-muted">Expiry</label>
                                        <input type="text" class="form-control" placeholder="MM/YY" maxlength="5"
                                            required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label small fw-bold text-muted">CVV</label>
                                        <input type="password" class="form-control" placeholder="123" maxlength="3"
                                            required>
                                    </div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg shadow-sm"
                                        onclick="showLoader(this)">
                                        Pay ₹{{ order.total_price }}
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade text-center" id="upi" role="tabpanel">
                            <div class="my-3">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=shop@upi&pn=AtipriyaPrints&am={{ order.total_price }}"
                                    class="img-fluid border p-2 rounded shadow-sm mb-3">
                                <p class="text-muted small mb-4">Scan using any UPI App (GPay, PhonePe, Paytm)</p>

                                <form action="{{ url_for('user_bp.process_payment', order_id=order.id) }}"
                                    method="POST">
                                    <div class="d-grid px-5">
                                        <button type="submit" class="btn btn-success btn-lg shadow-sm"
                                            onclick="showLoader(this)">
                                            <i class="fas fa-check-circle me-2"></i>I Have Paid
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="card-footer bg-light text-center py-3">
                    <small class="text-muted"><i class="fas fa-shield-alt text-success me-1"></i> 256-bit SSL
                        Encrypted</small>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function showLoader(btn) {
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';
        btn.classList.add('disabled');
        // Allow form to submit normally
    }
</script>
{% endblock %}
