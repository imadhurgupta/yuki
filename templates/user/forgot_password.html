{% extends "layouts/base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="container py-4 py-md-5 reveal">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="auth-card p-4 p-md-5">
                <div class="text-center mb-5">
                    <h3 class="fw-bolder display-6 text-dark mb-2">Reset Password</h3>
                    <p class="text-muted">Enter your email to receive an OTP</p>
                </div>

                <form method="POST">
                    <div class="form-floating mb-4">
                        <input type="email" name="email" class="form-control" id="emailInput"
                            placeholder="name@example.com" required>
                        <label for="emailInput">Email Address</label>
                    </div>

                    <div class="d-grid mt-2 mb-4">
                        <button type="submit"
                            class="btn btn-primary btn-ripple rounded-pill py-3 fw-bold text-uppercase ls-1 hover-up">
                            Send OTP
                        </button>
                    </div>
                </form>

                <p class="text-center mt-3 text-muted">
                    Remembered your password? <a href="{{ url_for('auth_bp.login') }}"
                        class="fw-bold text-primary text-decoration-none">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
