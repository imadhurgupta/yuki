{% extends "layouts/base.html" %}

{% block title %}Register - Yuki{% endblock %}

{% block content %}
<div class="container py-4 py-md-5 reveal">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="auth-card p-4 p-md-5">
                <div class="text-center mb-5">
                    <h3 class="fw-bolder display-6 text-dark mb-2">Create Account</h3>
                    <p class="text-muted">Join Yuki today</p>
                </div>

                <form method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" name="full_name" class="form-control" id="nameInput" placeholder="John Doe"
                            required>
                        <label for="nameInput">Full Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" name="email" class="form-control" id="emailInput"
                            placeholder="name@example.com" required>
                        <label for="emailInput">Email Address</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" name="password" class="form-control" id="passwordInput"
                            placeholder="Password" required>
                        <label for="passwordInput">Password</label>
                    </div>

                    <div class="d-grid mt-2 mb-4">
                        <button type="submit"
                            class="btn btn-primary btn-ripple rounded-pill py-3 fw-bold text-uppercase ls-1 hover-up">
                            Sign Up
                        </button>
                    </div>
                </form>

                <div class="divider my-4">
                    <span class="divider-text text-muted">OR</span>
                </div>

                <div class="d-grid mb-4">
                    <a href="{{ url_for('auth_bp.google_login') }}" class="btn btn-google hover-up">
                        <svg class="google-icon" viewBox="0 0 48 48">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                            <path fill="none" d="M0 0h48v48H0z" />
                        </svg>
                        <span>Sign up with Google</span>
                    </a>
                </div>

                <p class="text-center mt-3 text-muted">
                    Already have an account? <a href="{{ url_for('auth_bp.login') }}"
                        class="fw-bold text-primary text-decoration-none">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
