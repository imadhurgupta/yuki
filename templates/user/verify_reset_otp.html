{% extends "layouts/base.html" %}
{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5 text-center">
                    <h4 class="fw-bold mb-3">Verify Identity</h4>
                    <p class="text-muted small mb-4">Check your email for the code.</p>
                    
                    <form method="POST">
                        <div class="mb-4">
                            <input type="text" name="otp" class="form-control text-center fw-bold fs-4 letter-spacing-2" 
                                   maxlength="6" placeholder="------" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success rounded-pill">Verify Code</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
